<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-6 bg-gray-100">

<h1 class="text-xl font-bold mb-4">Shop</h1>

<button onclick="buy()" class="bg-blue-600 text-white px-4 py-2 rounded">
  Buy Sample Cart
</button>

<script>
async function buy() {
  const res = await fetch("/api/create-order", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      items: [
        {id: "p1", qty: 1},
        {id: "p3", qty: 2}
      ],
      name: "Test User",
      phone: "01700000000",
      email: "test@gmail.com"
    })
  });

  const data = await res.json();
  console.log(data);

  if (data.payment_url) {
    window.location.href = data.payment_url;
  } else {
    alert("Payment failed");
  }
}
</script>

</body>
</html>
