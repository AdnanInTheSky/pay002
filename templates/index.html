<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900">

<!-- HEADER -->
<header class="bg-white shadow">
  <div class="max-w-6xl mx-auto p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">Mini Shop</h1>
    <div class="text-sm bg-gray-100 px-3 py-1 rounded">
      Cart: <span id="cartCount">0</span>
    </div>
  </div>
</header>

<!-- CONTENT -->
<main class="max-w-6xl mx-auto p-4 grid md:grid-cols-3 gap-6">

  <!-- PRODUCTS -->
  <section class="md:col-span-2">
    <h2 class="text-lg font-semibold mb-4">Products</h2>

    <div class="grid gap-4">

      <!-- Product Card -->
      <div class="bg-white p-4 rounded shadow flex justify-between items-center">
        <div>
          <h3 class="font-semibold">Product 1</h3>
          <p class="text-sm text-gray-500">৳5</p>
        </div>
        <button onclick="add('p1')" class="bg-green-600 text-white px-3 py-1 rounded">
          Add
        </button>
      </div>

      <div class="bg-white p-4 rounded shadow flex justify-between items-center">
        <div>
          <h3 class="font-semibold">Product 2</h3>
          <p class="text-sm text-gray-500">৳7</p>
        </div>
        <button onclick="add('p2')" class="bg-green-600 text-white px-3 py-1 rounded">
          Add
        </button>
      </div>

      <div class="bg-white p-4 rounded shadow flex justify-between items-center">
        <div>
          <h3 class="font-semibold">Product 3</h3>
          <p class="text-sm text-gray-500">৳10</p>
        </div>
        <button onclick="add('p3')" class="bg-green-600 text-white px-3 py-1 rounded">
          Add
        </button>
      </div>

    </div>
  </section>

  <!-- CART -->
  <aside class="bg-white p-4 rounded shadow h-fit">

    <h2 class="text-lg font-semibold mb-3">Cart</h2>

    <div id="cart" class="space-y-2 text-sm"></div>

    <div class="mt-3 font-semibold">
      Total: ৳<span id="total">0</span>
    </div>

    <hr class="my-4">

    <!-- USER INPUT -->
    <div class="space-y-2">
      <input id="name" class="w-full border p-2 rounded" placeholder="Full Name">
      <input id="phone" class="w-full border p-2 rounded" placeholder="Phone">
      <input id="email" class="w-full border p-2 rounded" placeholder="Email">
    </div>

    <button onclick="checkout()"
      class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded">
      Checkout
    </button>

    <p class="text-xs text-gray-400 mt-2">
      Final price is verified by server
    </p>

  </aside>

</main>

<script>
/* =========================
   PRODUCT DATA (DISPLAY ONLY)
========================= */
const PRODUCTS = {
  p1: { name: "Product 1", price: 5 },
  p2: { name: "Product 2", price: 7 },
  p3: { name: "Product 3", price: 10 }
};

/* =========================
   SAFE CART INIT (FIXED BUG)
========================= */
let cart = [];

try {
  const saved = localStorage.getItem("cart");
  const parsed = saved ? JSON.parse(saved) : [];

  cart = Array.isArray(parsed) ? parsed : [];
} catch (e) {
  cart = [];
}

/* =========================
   SAVE CART
========================= */
function save() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* =========================
   ADD ITEM
========================= */
function add(id) {
  const item = cart.find(i => i.id === id);

  if (item) {
    item.qty += 1;
  } else {
    cart.push({ id: id, qty: 1 });
  }

  save();
  render();
}

/* =========================
   REMOVE ITEM
========================= */
function remove(id) {
  cart = cart.filter(i => i.id !== id);
  save();
  render();
}

/* =========================
   DECREASE QTY
========================= */
function decrease(id) {
  const item = cart.find(i => i.id === id);

  if (!item) return;

  item.qty -= 1;

  if (item.qty <= 0) {
    cart = cart.filter(i => i.id !== id);
  }

  save();
  render();
}

/* =========================
   CALCULATE TOTAL (UI ONLY)
========================= */
function total() {
  let sum = 0;

  for (let item of cart) {
    sum += PRODUCTS[item.id].price * item.qty;
  }

  return sum;
}

/* =========================
   RENDER CART
========================= */
function render() {
  const box = document.getElementById("cart");
  box.innerHTML = "";

  let count = 0;

  for (let item of cart) {
    const p = PRODUCTS[item.id];
    count += item.qty;

    box.innerHTML += `
      <div class="border-b pb-2">
        <div class="flex justify-between items-center">
          <span>${p.name}</span>
          <span>× ${item.qty}</span>
        </div>

        <div class="flex gap-2 mt-1">
          <button onclick="add('${item.id}')" class="text-green-600 text-xs">+</button>
          <button onclick="decrease('${item.id}')" class="text-yellow-600 text-xs">-</button>
          <button onclick="remove('${item.id}')" class="text-red-600 text-xs">remove</button>
        </div>
      </div>
    `;
  }

  document.getElementById("cartCount").innerText = count;
  document.getElementById("total").innerText = total();
}

/* =========================
   CHECKOUT
========================= */
async function checkout() {
  if (cart.length === 0) {
    alert("Cart empty");
    return;
  }

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!name || !phone || !email) {
    alert("Fill all fields");
    return;
  }

  const res = await fetch("/api/create-order", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      items: cart,
      name,
      phone,
      email
    })
  });

  const data = await res.json();

  if (data.payment_url) {
    localStorage.removeItem("cart");
    window.location.href = data.payment_url;
  } else {
    alert("Payment failed");
    console.log(data);
  }
}

/* =========================
   INIT
========================= */
render();
</script>

</body>
</html>
